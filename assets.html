<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NaboCity - Visual Asset Viewer</title>
  <style>
    :root {
      --bg-main: #0b0f19;
      --bg-card: #151c2c;
      --bg-hover: #1e293b;
      --border-color: #2e3b4e;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --success: #10b981;
      --font: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-main);
      color: var(--text-main);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    header {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: rgba(21, 28, 44, 0.85);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-info h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      margin-bottom: 0.25rem;
      background: linear-gradient(to right, #60a5fa, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-info p {
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    .header-controls {
      display: flex;
      gap: 1rem;
    }

    .btn {
      background-color: var(--accent);
      color: var(--text-main);
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn:hover {
      background-color: var(--accent-hover);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background-color: transparent;
      border: 1px solid var(--border-color);
    }

    .btn-secondary:hover {
      background-color: var(--bg-hover);
    }

    /* Grid columns titles */
    .grid-header-labels {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      max-width: 1200px;
      width: 100%;
      margin: 1.5rem auto 0 auto;
      padding: 0 2rem;
    }

    .column-title {
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      font-weight: 700;
      border-bottom: 2px solid var(--border-color);
      padding-bottom: 0.5rem;
      text-align: center;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      padding: 1.5rem 2rem 3rem 2rem;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
    }

    .row-indicator {
      position: absolute;
      left: 12px;
      top: 12px;
      background: rgba(11, 15, 25, 0.8);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-main);
      pointer-events: none;
      z-index: 2;
      border: 1px solid var(--border-color);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .cell {
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      position: relative;
      display: flex;
      flex-direction: column;
      height: 280px;
      overflow: hidden;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .cell:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 10px 20px -10px rgba(59, 130, 246, 0.3);
    }

    .cell-empty {
      background-color: rgba(11, 15, 25, 0.2);
      border: 1px dashed var(--border-color);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 280px;
      color: var(--text-muted);
      font-size: 0.875rem;
      font-style: italic;
    }

    .cell-preview-container {
      flex: 1;
      position: relative;
      background: radial-gradient(circle at center, #1b263b 0%, #0d131f 100%);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .cell-preview-container img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transition: transform 0.3s ease;
    }

    .cell:hover .cell-preview-container img {
      transform: scale(1.05);
    }

    .cell-meta {
      padding: 0.75rem 1rem;
      border-top: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: rgba(11, 15, 25, 0.4);
    }

    .meta-details h3 {
      font-size: 0.875rem;
      font-weight: 600;
    }

    .meta-details p {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.125rem;
    }

    .cell-actions {
      display: flex;
      gap: 0.5rem;
    }

    .btn-icon {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      width: 32px;
      height: 32px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-icon:hover {
      border-color: var(--accent);
      color: var(--text-main);
      background-color: var(--bg-hover);
    }

    /* Modal Styling */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(7, 10, 17, 0.85);
      backdrop-filter: blur(8px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-window {
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      width: 90vw;
      max-width: 900px;
      height: 80vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transform: scale(0.95);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .modal-overlay.active .modal-window {
      transform: scale(1);
    }

    .modal-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-title h2 {
      font-size: 1.25rem;
      font-weight: 700;
    }

    .modal-title p {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-top: 0.125rem;
    }

    .modal-close {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 1.75rem;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
    }

    .modal-close:hover {
      color: var(--text-main);
    }

    .modal-body {
      flex: 1;
      display: flex;
      position: relative;
    }

    .modal-viewport {
      flex: 1;
      background: radial-gradient(circle at center, #1b263b 0%, #080c14 100%);
      position: relative;
      outline: none;
    }

    .modal-sidebar {
      width: 280px;
      border-left: 1px solid var(--border-color);
      background-color: rgba(11, 15, 25, 0.3);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .control-group h4 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }

    .control-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .btn-toggle {
      flex: 1;
      background-color: var(--bg-hover);
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      padding: 0.5rem;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-toggle.active {
      background-color: var(--accent);
      border-color: var(--accent);
      color: var(--text-main);
    }

    .seed-info-box {
      background-color: rgba(11, 15, 25, 0.5);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.875rem;
    }

    .seed-info-box div {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.25rem;
    }

    .seed-info-box div:last-child {
      margin-bottom: 0;
    }

    .seed-info-box span:first-child {
      color: var(--text-muted);
    }

    .seed-info-box span:last-child {
      font-weight: 600;
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 50;
      transition: opacity 0.5s ease;
      gap: 1.5rem;
    }

    .spinner {
      border: 4px solid rgba(59, 130, 246, 0.1);
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border-left-color: var(--accent);
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <!-- Loading Screen -->
  <div class="loading-overlay" id="loading-screen">
    <div class="spinner"></div>
    <div style="font-weight: 600; font-size: 1.125rem;">Building Asset Catalog...</div>
  </div>

  <header>
    <div class="header-info">
      <h1>NaboCity - Visual Asset Catalog</h1>
      <p>Click any asset to explore in 3D. Roll random seeds to test variations.</p>
    </div>
    <div class="header-controls">
      <button class="btn btn-secondary" onclick="window.location.href='/'">
        ← Back to City Map
      </button>
      <button class="btn" id="regen-all-btn">
        🎲 Re-Roll Seeds
      </button>
    </div>
  </header>

  <!-- Grid Header Columns titles -->
  <div class="grid-header-labels">
    <div class="column-title">Level 1 / Standard</div>
    <div class="column-title">Level 2</div>
    <div class="column-title">Level 3</div>
  </div>

  <!-- Grid Container -->
  <main class="grid-container" id="grid">
    <!-- Grid items will be dynamically generated by JS -->
  </main>

  <!-- Interactive 3D Model Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal-window">
      <div class="modal-header">
        <div class="modal-title">
          <h2 id="modal-house-title">-</h2>
          <p id="modal-house-subtitle">-</p>
        </div>
        <button class="modal-close" id="modal-close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <!-- Three.js Canvas Container -->
        <div class="modal-viewport" id="modal-canvas-container" tabindex="0"></div>
        <div class="modal-sidebar">
          
          <div class="control-group">
            <h4>Time of Day</h4>
            <div class="control-row">
              <button class="btn-toggle active" id="tod-day-btn">☀️ Day</button>
              <button class="btn-toggle" id="tod-night-btn">🌙 Night</button>
            </div>
          </div>

          <div class="control-group">
            <h4>Model Controls</h4>
            <button class="btn btn-secondary" style="width: 100%; margin-bottom: 0.5rem;" id="modal-reset-btn">
              🔄 Reset View
            </button>
            <button class="btn" style="width: 100%;" id="modal-regen-btn">
              🎲 Roll Random Seed
            </button>
          </div>

          <div class="control-group">
            <h4>Asset Details</h4>
            <div class="seed-info-box">
              <div>
                <span>Category</span>
                <span id="info-arch-type">-</span>
              </div>
              <div id="row-info-wall-mat">
                <span>Primary color</span>
                <span id="info-wall-mat">-</span>
              </div>
              <div id="row-info-found-mat">
                <span>Foundation</span>
                <span id="info-found-mat">-</span>
              </div>
              <div>
                <span>Seed X</span>
                <span id="info-seed-x">0</span>
              </div>
              <div>
                <span>Seed Y</span>
                <span id="info-seed-y">0</span>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <!-- Entry Script -->
  <script type="module" src="/src/assets.ts"></script>
</body>
</html>
